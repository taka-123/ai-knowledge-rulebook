<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">[タイトル]</title>
  <desc id="desc">[画像の内容を説明]</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#315c6b"/>
    </marker>
    <filter id="paperShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#24343b" flood-opacity="0.12"/>
    </filter>
    <pattern id="paperDots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#dfe9e7"/>
    </pattern>
    <style>
      .title { font: 800 54px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif; fill: #18323c; }
      .subtitle { font: 650 26px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif; fill: #52666e; }
      .block-title { font: 800 31px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif; fill: #18323c; }
      .body { font: 600 25px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif; fill: #334b54; }
      .small { font: 650 22px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif; fill: #52666e; }
      .core { font: 850 35px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif; fill: #0e4857; }
      .line { fill: none; stroke: #315c6b; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .arrow { fill: none; stroke: #315c6b; stroke-width: 5; stroke-linecap: round; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#fbfaf5"/>
  <rect width="1600" height="900" fill="url(#paperDots)" opacity="0.55"/>

  <g id="header">
    <text x="80" y="85" class="title">[タイトル]</text>
    <text x="82" y="128" class="subtitle">[対象・確認時点]</text>
    <path d="M 80 150 C 390 165, 750 140, 1100 155" class="line" stroke="#ef8f62"/>
  </g>

  <g id="core-message" filter="url(#paperShadow)">
    <rect x="475" y="205" width="650" height="175" rx="34" fill="#e6f3f0" stroke="#2d7a72" stroke-width="5"/>
    <text x="800" y="270" text-anchor="middle" class="small">最重要メッセージ</text>
    <text x="800" y="325" text-anchor="middle" class="core">[核心を1〜2行で記載]</text>
  </g>

  <g id="block-left" filter="url(#paperShadow)">
    <rect x="75" y="220" width="330" height="245" rx="28" fill="#fff" stroke="#e59a5f" stroke-width="5"/>
    <text x="105" y="270" class="block-title">[ブロック1]</text>
    <text x="110" y="320" class="body">
      <tspan x="110" dy="0">• [短い要点]</tspan>
      <tspan x="110" dy="42">• [短い要点]</tspan>
      <tspan x="110" dy="42">• [短い要点]</tspan>
    </text>
  </g>

  <g id="block-right" filter="url(#paperShadow)">
    <rect x="1195" y="220" width="330" height="245" rx="28" fill="#fff" stroke="#5b8cc0" stroke-width="5"/>
    <text x="1225" y="270" class="block-title">[ブロック2]</text>
    <text x="1230" y="320" class="body">
      <tspan x="1230" dy="0">• [短い要点]</tspan>
      <tspan x="1230" dy="42">• [短い要点]</tspan>
      <tspan x="1230" dy="42">• [短い要点]</tspan>
    </text>
  </g>

  <path d="M 405 340 C 435 330, 445 315, 475 305" class="arrow"/>
  <path d="M 1125 305 C 1155 315, 1165 330, 1195 340" class="arrow"/>

  <g id="block-bottom-left" filter="url(#paperShadow)">
    <rect x="105" y="555" width="410" height="210" rx="28" fill="#fff" stroke="#6c9f70" stroke-width="5"/>
    <text x="135" y="605" class="block-title">[ブロック3]</text>
    <text x="140" y="655" class="body">
      <tspan x="140" dy="0">• [短い要点]</tspan>
      <tspan x="140" dy="42">• [短い要点]</tspan>
    </text>
  </g>

  <g id="block-bottom-center" filter="url(#paperShadow)">
    <rect x="595" y="555" width="410" height="210" rx="28" fill="#fff" stroke="#b78ab9" stroke-width="5"/>
    <text x="625" y="605" class="block-title">[ブロック4]</text>
    <text x="630" y="655" class="body">
      <tspan x="630" dy="0">• [短い要点]</tspan>
      <tspan x="630" dy="42">• [短い要点]</tspan>
    </text>
  </g>

  <g id="block-bottom-right" filter="url(#paperShadow)">
    <rect x="1085" y="555" width="410" height="210" rx="28" fill="#fff" stroke="#d2a640" stroke-width="5"/>
    <text x="1115" y="605" class="block-title">[ブロック5]</text>
    <text x="1120" y="655" class="body">
      <tspan x="1120" dy="0">• [短い要点]</tspan>
      <tspan x="1120" dy="42">• [短い要点]</tspan>
    </text>
  </g>

  <path d="M 650 380 C 590 440, 420 475, 330 555" class="arrow"/>
  <path d="M 800 380 L 800 555" class="arrow"/>
  <path d="M 950 380 C 1010 440, 1180 475, 1290 555" class="arrow"/>

  <g id="next-action">
    <path d="M 475 825 C 640 800, 960 800, 1125 825" class="line" stroke="#ef8f62"/>
    <text x="800" y="838" text-anchor="middle" class="block-title">次の一歩: [短い行動]</text>
  </g>
</svg>
